{% extends "base.html" %}

{% block title %}Create Project{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="page-header">
        <h2>Create project</h2>
        <a href="{{ url_for('projects.dashboard') }}" class="btn btn-secondary">Cancel</a>
    </div>
    
    <div class="card">
        <form method="POST" action="{{ url_for('projects.create_project') }}">
            <div class="form-group">
                <label class="form-label" for="name">Project name</label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="e.g., Product Launch">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="description">Description <span class="text-muted">(optional)</span></label>
                <textarea id="description" name="description" class="form-control" placeholder="Describe your project..."></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="deadline">Deadline</label>
                <input type="date" id="deadline" name="deadline" class="form-control" required>
            </div>
            
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <a href="{{ url_for('projects.dashboard') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create project</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
